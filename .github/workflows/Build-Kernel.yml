name: 🚀 Building GKI kernel android12-5.10-lts
on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (ALL = KWS + KSUN + VNL)'
        type: choice
        options:
          - KWS
          - KSUN
          - VNL
          - ALL
        default: KWS
      clang_variant:
        description: 'Clang toolchain Selection'
        type: choice
        options: 
          - CLANG-22
          - CLANG-21
          - CLANG-20
          - CLANG-19
          - CLANG-12
          - CLANG-12.0.8
          - ALL
        default: CLANG-19
      kernel_name:
        description: 'Kernel base name'
        type: string
        default: ""
      kernel_url:
        description: 'Kernel source URL'
        type: string
        default: ""
      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: ""
      ak3_url:
        description: 'AnyKernel3 source URL'
        type: string
        default: ""
      ak3_ref:
        description: 'AnyKernel3 branch'
        type: string
        default: ""
      kmi_symbol_check:
        description: 'Run KMI symbol validation (KMI_function_symbols_test.py)'
        type: boolean
        default: true
jobs:  
  # ── Resolve matrix from inputs ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants: ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}
    steps:
      - name: 🔧 Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KWS","KSUN","VNL"]' >> $GITHUB_OUTPUT
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi
          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["CLANG-22","CLANG-21","CLANG-20","CLANG-19","CLANG-12"]' >> $GITHUB_OUTPUT
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> $GITHUB_OUTPUT
          fi    
  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ksu: ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}
    steps:
      - name: 📥 Checkout workflow repo (build.sh lives here)
        uses: actions/checkout@v4
      - name: 📦 Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget binutils zstd

     # ── Set Timezone ──────────────────────────────────────────────────────────
      - name: 🕒 Set Timezone 
        run: |
         echo "BUILD_TIME=$(TZ=Asia/Jakarta date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
         sudo rm /etc/localtime
         sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

     # ── Google Clang 22 (r596125) ─────────────────────────────
      - name: ⬇️ Download Clang 22
        if: matrix.clang == 'CLANG-22'
        run: |
         mkdir -p ~/toolchain/clang-r596125
         cd ~/toolchain
         wget \
           https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/9b144befdfd93b90e02c663504fb9f4b95f9faf8/clang-r596125.tar.gz \
           -O clang-r596125.tar.gz
           ls -lh clang-r596125.tar.gz
           tar -xzf clang-r596125.tar.gz -C clang-r596125
           ~/toolchain/clang-r596125/bin/clang --version
         echo "Clang 22 (r596125) ready."

      # ── Google Clang 21 (r584948b) ─────────────────────────────
      - name: ⬇️ Download Clang 21
        if: matrix.clang == 'CLANG-21'
        run: |
         mkdir -p ~/toolchain/clang-r584948b
         cd ~/toolchain
         wget \
           https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/9b144befdfd93b90e02c663504fb9f4b95f9faf8/clang-r584948b.tar.gz \
           -O clang-r584948b.tar.gz
           ls -lh clang-r584948b.tar.gz
           tar -xzf clang-r584948b.tar.gz -C clang-r584948b
           ~/toolchain/clang-r584948b/bin/clang --version
         echo "Clang 21 (r584948b) ready."

      # ── Google Clang 20 (r547379) ─────────────────────────────
      - name: ⬇️ Download Clang 20
        if: matrix.clang == 'CLANG-20'  
        run: |
         mkdir -p ~/toolchain/clang-r547379
         cd ~/toolchain
         wget \
           https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/9b144befdfd93b90e02c663504fb9f4b95f9faf8/clang-r547379.tar.gz \
           -O clang-r547379.tar.gz
           ls -lh clang-r547379.tar.gz
           tar -xzf clang-r547379.tar.gz -C clang-r547379
           ~/toolchain/clang-r547379/bin/clang --version
         echo "Clang 20 (r547379) ready."
   
      # ── Clang 19 (crDroid mirror — r536225, PGO+BOLT+LTO+MLGO) ──────────
      - name: ⬇️ Download Clang 19
        if: matrix.clang == 'CLANG-19'
        run: |
          git clone --depth=1 \
            https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r536225.git \
            ~/toolchain/aosp-r536225
          echo "Clang 19 (r536225) ready."
      
      # ── AOSP Clang r416183b  (LLVM 12.0.5) ───────────────────────────────
      - name: ⬇️ Download Clang 12
        if: matrix.clang == 'CLANG-12'
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git \
            ~/toolchain/aosp-clang-r416183b
          echo " AOSP Clang r416183b  (LLVM 12.0.5) ready."

      # ── Clang 12.0.8 (clang-r416183c1) ───────────────────────────────
      - name: ⬇️ Download Clang 12.0.8
        if: matrix.clang == 'CLANG-12.0.8'
        run: |
         git clone \
         --depth=1 \
         --branch clang-r416183c1 \
         https://github.com/taufikdly84/wheeen.git \
         ~/toolchain/clang-r416183c1
         echo "Clang 12.0.8 (r416183c1) ready."
      
      # ── Verify Selected Clang ────────────────────────────────────────────
      - name: 🔍 Run Clang Audit Verification
        run: |
          case "${{ matrix.clang }}" in
            CLANG-22)   TC_PATH="$HOME/toolchain/clang-r596125/bin/clang" ;;
            CLANG-21)   TC_PATH="$HOME/toolchain/clang-r584948b/bin/clang" ;;
            CLANG-20)   TC_PATH="$HOME/toolchain/clang-r547379/bin/clang" ;;
            CLANG-19)   TC_PATH="$HOME/toolchain/aosp-r536225/bin/clang" ;;
            CLANG-12)   TC_PATH="$HOME/toolchain/aosp-clang-r416183b/bin/clang" ;;
            CLANG-12.0.8) TC_PATH="$HOME/toolchain/clang-r416183c1/bin/clang";;
          esac
          echo "=== Auditing: ${{ matrix.clang }} ==="
          $TC_PATH --version | head -n 2 || true
          readelf -S $TC_PATH | grep -iE "bolt|llvm_bb" || echo "No BOLT layout found"
          strings $TC_PATH | grep -iE "regalloc-model|inline-model|mlgo" | head -n 2 || echo "No MLGO models embedded"
      
      # ── Export CLANG_PATH ────────────────────────────────────────────────
      - name: 🌱 Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            CLANG-22)   echo "CLANG_PATH=$HOME/toolchain/clang-r596125" >> $GITHUB_ENV ;;
            CLANG-21)   echo "CLANG_PATH=$HOME/toolchain/clang-r584948b" >> $GITHUB_ENV ;;
            CLANG-20)   echo "CLANG_PATH=$HOME/toolchain/clang-r547379" >> $GITHUB_ENV ;;
            CLANG-19)   echo "CLANG_PATH=$HOME/toolchain/aosp-r536225"  >> $GITHUB_ENV ;;
            CLANG-12)   echo "CLANG_PATH=$HOME/toolchain/aosp-clang-r416183b" >> $GITHUB_ENV ;;
            CLANG-12.0.8)  echo "CLANG_PATH=$HOME/toolchain/clang-r416183c1" >> $GITHUB_ENV;;
          esac
      
      # ── Kernel source ────────────────────────────────────────────────────
      - name: 🌐 Shallow-clone kernel source
        run: |
          git clone \
          --depth=1 \
          --branch "${{ inputs.kernel_ref }}" \
          "${{ inputs.kernel_url }}" \
            kernel
      
      # ── KSU setup ────────────────────────────────────────────────────────
      - name: 🧩 Apply KernelSU (${{ matrix.ksu }})
        if: matrix.ksu != 'VNL'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KWS" ]; then
            curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=n\n' \
              >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=y\n' \
              >> arch/arm64/configs/gki_defconfig
          fi
          
      # ── Verify KSU integration ──────────────────────────────────────────────
      - name: ✅ Verify KSU integration (${{ matrix.ksu }})
        if: matrix.ksu != 'VNL'
        working-directory: kernel
        run: |
          echo "=== KSU directory check ==="
          ls -la KernelSU* 2>/dev/null || echo "WARNING: No KernelSU dir found!"
          echo "=== drivers/kernelsu check ==="
          ls drivers/kernelsu/ 2>/dev/null || echo "WARNING: drivers/kernelsu missing!"
          echo "=== Kconfig/Makefile hooks ==="
          grep -r "kernelsu\|KSU" drivers/Makefile drivers/Kconfig 2>/dev/null || echo "WARNING: No KSU hooks in drivers!"
          echo "=== gki_defconfig KSU entries ==="
          grep "CONFIG_KSU" arch/arm64/configs/gki_defconfig || echo "WARNING: No KSU configs in gki_defconfig!"

      # ── Apply SUSFS patches ──────────────────────────────────────────────
      - name: 🩹 Apply SUSFS patches (KSUN only)
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r "$susfs/fs" .
          cp -r "$susfs/include" .
          cp -r "$susfs/50_add_susfs_in_gki-android12-5.10.patch" .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
    
      # ── Apply NoMount ──────────────────────────────────────────────
      - name: 🚫 Apply NoMount patch
        if: matrix.ksu == 'KWS' 
        working-directory: kernel
        run: |
          git clone --depth=1 https://github.com/maxsteeel/nomount nomount
          
          echo "=== Import NoMount sources ==="

          mkdir -p fs

          cp nomount/kernel/src/nomount.c fs/
          cp nomount/kernel/src/nomount.h fs/

          wget -q \
          https://raw.githubusercontent.com/maxsteeel/nomount/master/kernel/patches/nomount_5.10_kernel_integration.patch \
          -O nomount.patch
  
          patch -p1 --forward < nomount.patch || true

          echo "=== Enable NoMount ==="

          grep -q '^CONFIG_NOMOUNT=' arch/arm64/configs/gki_defconfig \
          && sed -i \
          's/^CONFIG_NOMOUNT=.*/CONFIG_NOMOUNT=y/' \
          arch/arm64/configs/gki_defconfig \
          || echo 'CONFIG_NOMOUNT=y' \
          >> arch/arm64/configs/gki_defconfig
          
          echo "=== Verify ==="

          test -f fs/nomount.c && echo "nomount.c OK"
          test -f fs/nomount.h && echo "nomount.h OK"

          grep CONFIG_NOMOUNT arch/arm64/configs/gki_defconfig
          
      # ── Inject LOCALVERSION ──────────────────────────────────────────────
      - name: 🏷️ Set LOCALVERSION in gki_defconfig
        working-directory: kernel
        run: |
          LOCALVER="-${{ inputs.kernel_name }}"
          printf '\nCONFIG_LOCALVERSION="%s"\n' "$LOCALVER" \
            >> arch/arm64/configs/gki_defconfig
          echo "LOCALVERSION set to: $LOCALVER"

      # ── Build ────────────────────────────────────────────────────────────
      - name: 🏗️ Run build.sh
        working-directory: kernel
        env:
          CLANG_PATH: ${{ env.CLANG_PATH }}
          CLANG_VARIANT: ${{ matrix.clang }}
          KMI_SYMBOL_CHECK: ${{ inputs.kmi_symbol_check }}
        run: |
          cp "$GITHUB_WORKSPACE/build.sh" .
          chmod +x build.sh
          ./build.sh
    
      # ── Package ──────────────────────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}-${BUILD_TIME}"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          git clone \
          --depth=1 \
          --branch "${{ inputs.ak3_ref }}" \
          "${{ inputs.ak3_url }}" \
            anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/Image
          cd anykernel
          zip -r9 "../${ZIP_NAME}.zip" . \
            --exclude="*.git*" --exclude="README.md" --exclude="*.placeholder"
      - name: 📤 Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ matrix.ksu }}-${{ matrix.clang }}-${{ inputs.kernel_ref }}
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: error
      - name: 📤 Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: anykernel/*
          if-no-files-found: error

      
